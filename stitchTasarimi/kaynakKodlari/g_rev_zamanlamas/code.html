<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Task Scheduling Bottom Sheet</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "secondary-fixed": "#9feffe",
                  "outline": "#707881",
                  "on-background": "#181c1f",
                  "primary-fixed-dim": "#94ccff",
                  "surface-container": "#ebeef2",
                  "inverse-surface": "#2d3134",
                  "on-tertiary-container": "#ecf9ff",
                  "on-surface-variant": "#404850",
                  "surface-container-highest": "#e0e3e7",
                  "on-tertiary-fixed-variant": "#004e5f",
                  "surface": "#f7fafe",
                  "secondary": "#006875",
                  "error": "#ba1a1a",
                  "tertiary": "#006176",
                  "tertiary-fixed-dim": "#4cd6fb",
                  "outline-variant": "#bfc7d1",
                  "tertiary-fixed": "#b3ebff",
                  "surface-tint": "#006399",
                  "surface-bright": "#f7fafe",
                  "on-primary-fixed": "#001d32",
                  "on-tertiary-fixed": "#001f27",
                  "on-secondary-container": "#016d7a",
                  "on-error": "#ffffff",
                  "surface-variant": "#e0e3e7",
                  "secondary-container": "#9cecfb",
                  "tertiary-container": "#007c95",
                  "surface-container-high": "#e5e8ec",
                  "primary-container": "#0077b6",
                  "on-surface": "#181c1f",
                  "inverse-primary": "#94ccff",
                  "primary-fixed": "#cde5ff",
                  "surface-dim": "#d7dade",
                  "on-primary": "#ffffff",
                  "on-primary-container": "#f3f7ff",
                  "background": "#f7fafe",
                  "surface-container-low": "#f1f4f8",
                  "on-tertiary": "#ffffff",
                  "on-error-container": "#93000a",
                  "secondary-fixed-dim": "#83d3e1",
                  "primary": "#005d90",
                  "on-primary-fixed-variant": "#004b74",
                  "on-secondary-fixed": "#001f24",
                  "on-secondary": "#ffffff",
                  "surface-container-lowest": "#ffffff",
                  "on-secondary-fixed-variant": "#004f59",
                  "inverse-on-surface": "#eef1f5",
                  "error-container": "#ffdad6"
          },
          "borderRadius": {
                  "DEFAULT": "0.25rem",
                  "lg": "0.5rem",
                  "xl": "0.75rem",
                  "full": "9999px"
          },
          "spacing": {
                  "margin-desktop": "48px",
                  "margin-mobile": "20px",
                  "lg": "40px",
                  "base": "8px",
                  "gutter": "16px",
                  "md": "24px",
                  "xl": "64px",
                  "xs": "4px",
                  "sm": "12px"
          },
          "fontFamily": {
                  "headline-md": [
                          "Plus Jakarta Sans"
                  ],
                  "body-lg": [
                          "Plus Jakarta Sans"
                  ],
                  "label-sm": [
                          "Plus Jakarta Sans"
                  ],
                  "headline-sm": [
                          "Plus Jakarta Sans"
                  ],
                  "headline-lg": [
                          "Plus Jakarta Sans"
                  ],
                  "label-lg": [
                          "Plus Jakarta Sans"
                  ],
                  "body-md": [
                          "Plus Jakarta Sans"
                  ]
          },
          "fontSize": {
                  "headline-md": [
                          "24px",
                          {
                                  "lineHeight": "1.3",
                                  "fontWeight": "600"
                          }
                  ],
                  "body-lg": [
                          "18px",
                          {
                                  "lineHeight": "1.6",
                                  "fontWeight": "400"
                          }
                  ],
                  "label-sm": [
                          "12px",
                          {
                                  "lineHeight": "1.2",
                                  "letterSpacing": "0.05em",
                                  "fontWeight": "500"
                          }
                  ],
                  "headline-sm": [
                          "20px",
                          {
                                  "lineHeight": "1.4",
                                  "fontWeight": "600"
                          }
                  ],
                  "headline-lg": [
                          "32px",
                          {
                                  "lineHeight": "1.2",
                                  "fontWeight": "700"
                          }
                  ],
                  "label-lg": [
                          "14px",
                          {
                                  "lineHeight": "1.2",
                                  "letterSpacing": "0.02em",
                                  "fontWeight": "600"
                          }
                  ],
                  "body-md": [
                          "16px",
                          {
                                  "lineHeight": "1.5",
                                  "fontWeight": "400"
                          }
                  ]
          }
  },
      },
    }
  </script>
<style>
    body {
      background-color: rgba(0,0,0,0.4);
      display: flex;
      justify-content: center;
      align-items: flex-end;
      height: 100vh;
      margin: 0;
    }
    
    .hide-scrollbar::-webkit-scrollbar {
        display: none;
    }
    .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-body-md text-body-md text-on-background">
<!-- Bottom Sheet Container -->
<div class="w-full max-w-md bg-background rounded-t-[32px] shadow-[0_-8px_30px_rgba(0,119,182,0.08)] flex flex-col relative overflow-hidden">
<!-- Drag Handle -->
<div class="w-full flex justify-center pt-4 pb-2">
<div class="w-12 h-1.5 bg-surface-variant rounded-full"></div>
</div>
<div class="px-md pb-margin-mobile flex flex-col gap-md">
<!-- Section 1: Tarih (Date) -->
<section class="flex flex-col gap-sm">
<h3 class="font-headline-sm text-headline-sm text-on-surface">Tarih</h3>
<div class="flex overflow-x-auto hide-scrollbar gap-sm pb-2 -mx-md px-md">
<!-- Inactive Date -->
<button class="flex flex-col items-center justify-center min-w-[64px] h-[80px] rounded-2xl bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high transition-colors">
<span class="font-label-sm text-label-sm uppercase mb-1">Pts</span>
<span class="font-headline-md text-headline-md">12</span>
</button>
<!-- Inactive Date -->
<button class="flex flex-col items-center justify-center min-w-[64px] h-[80px] rounded-2xl bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high transition-colors">
<span class="font-label-sm text-label-sm uppercase mb-1">Sal</span>
<span class="font-headline-md text-headline-md">13</span>
</button>
<!-- Active Date (Primary Blue Pill) -->
<button class="flex flex-col items-center justify-center min-w-[64px] h-[80px] rounded-2xl bg-primary-container text-on-primary-container shadow-sm shadow-primary/20 scale-[1.02] transition-transform">
<span class="font-label-sm text-label-sm uppercase mb-1">Çar</span>
<span class="font-headline-md text-headline-md">14</span>
</button>
<!-- Inactive Date -->
<button class="flex flex-col items-center justify-center min-w-[64px] h-[80px] rounded-2xl bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high transition-colors">
<span class="font-label-sm text-label-sm uppercase mb-1">Per</span>
<span class="font-headline-md text-headline-md">15</span>
</button>
<!-- Inactive Date -->
<button class="flex flex-col items-center justify-center min-w-[64px] h-[80px] rounded-2xl bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high transition-colors">
<span class="font-label-sm text-label-sm uppercase mb-1">Cum</span>
<span class="font-headline-md text-headline-md">16</span>
</button>
</div>
</section>
<!-- Section 2: Zaman (Time) -->
<section class="flex flex-col gap-sm">
<h3 class="font-headline-sm text-headline-sm text-on-surface">Zaman</h3>
<div class="flex items-center gap-sm">
<!-- Hours Input -->
<div class="relative flex-1">
<input class="w-full h-16 bg-surface-container-lowest text-center font-headline-lg text-headline-lg text-on-surface rounded-2xl border-none focus:ring-2 focus:ring-secondary-container shadow-sm shadow-sky-900/5 placeholder-outline-variant" max="23" min="0" type="number" value="09"/>
</div>
<!-- Separator -->
<span class="font-headline-lg text-headline-lg text-on-surface-variant">:</span>
<!-- Minutes Input -->
<div class="relative flex-1">
<input class="w-full h-16 bg-surface-container-lowest text-center font-headline-lg text-headline-lg text-on-surface rounded-2xl border-none focus:ring-2 focus:ring-secondary-container shadow-sm shadow-sky-900/5 placeholder-outline-variant" max="59" min="0" type="number" value="30"/>
</div>
</div>
</section>
<!-- Section 3: Bitiş Tarihi Ekle (Add End Date Toggle) -->
<section class="flex items-center justify-between p-4 bg-surface-container-low rounded-2xl">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-tertiary-container" style="font-variation-settings: 'FILL' 1;">calendar_month</span>
<span class="font-label-lg text-label-lg text-on-surface">Bitiş Tarihi Ekle</span>
</div>
<!-- Toggle Switch (Active Cyan) -->
<button class="relative inline-flex h-7 w-12 items-center rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-secondary focus:ring-offset-2 bg-outline-variant">
<span class="inline-block h-5 w-5 transform rounded-full transition-transform translate-x-1 bg-outline"></span>
</button>
</section>
<!-- Create Button -->
<div class="pt-sm">
<button class="w-full h-14 flex items-center justify-center bg-primary-container hover:bg-primary text-on-primary-container font-label-lg text-label-lg rounded-2xl shadow-md shadow-primary/10 transition-all active:scale-[0.98]">
          Oluştur
        </button>
</div>
</div>
</div>
</body></html>
