<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>YAPILACAK EKLE</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#ded8e0",
                        "secondary-fixed-dim": "#cdc0e9",
                        "secondary-fixed": "#e9ddff",
                        "on-tertiary": "#ffffff",
                        "surface-container-highest": "#e6e0e9",
                        "on-background": "#1d1b20",
                        "surface-tint": "#6750a4",
                        "on-secondary": "#ffffff",
                        "background": "#fdf7ff",
                        "on-tertiary-fixed": "#241a00",
                        "on-primary-fixed-variant": "#4f378a",
                        "inverse-primary": "#cfbcff",
                        "error": "#ba1a1a",
                        "surface-variant": "#e6e0e9",
                        "on-primary": "#ffffff",
                        "primary-fixed-dim": "#cfbcff",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#e9ddff",
                        "on-primary-container": "#e0d2ff",
                        "primary": "#4f378a",
                        "outline": "#7a7582",
                        "on-surface": "#1d1b20",
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "on-tertiary-container": "#503d00",
                        "tertiary-container": "#c9a74d",
                        "tertiary": "#765b00",
                        "on-surface-variant": "#494551",
                        "on-tertiary-fixed-variant": "#594400",
                        "secondary-container": "#e1d4fd",
                        "on-secondary-fixed": "#1f1635",
                        "inverse-surface": "#322f35",
                        "surface-bright": "#fdf7ff",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#ece6ee",
                        "on-secondary-container": "#645a7d",
                        "inverse-on-surface": "#f5eff7",
                        "tertiary-fixed-dim": "#e7c365",
                        "tertiary-fixed": "#ffdf93",
                        "surface": "#fdf7ff",
                        "surface-container": "#f2ecf4",
                        "primary-container": "#6750a4",
                        "outline-variant": "#cbc4d2",
                        "on-secondary-fixed-variant": "#4b4263",
                        "surface-container-low": "#f8f2fa",
                        "secondary": "#63597c",
                        "on-primary-fixed": "#22005d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "gutter": "20px",
                        "xl": "32px",
                        "unit": "4px",
                        "sm": "8px",
                        "lg": "24px",
                        "md": "16px",
                        "margin": "24px"
                    },
                    "fontFamily": {
                        "title-lg": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "label-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "title-lg": ["20px", { "lineHeight": "1.4", "fontWeight": "700" }],
                        "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "label-lg": ["14px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "1.2", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .neo-shadow { box-shadow: 6px 6px 0px #000000; }
        .neo-shadow-sm { box-shadow: 4px 4px 0px #000000; }
        .neo-shadow-btn { box-shadow: 6px 6px 0px #000000; transition: all 0.2s; }
        .neo-shadow-btn:active { box-shadow: 2px 2px 0px #000000; transform: translate(4px, 4px); }
        .border-neo { border: 3px solid #1d1b20; }
        .border-neo-thick { border: 4px solid #1d1b20; }
        .bg-app { background-color: #F8FBFF; }
        .bg-yellow-brand { background-color: #FFD87C; }
        .bg-blue-brand { background-color: #0077B6; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-app text-on-surface font-body-md min-h-screen flex flex-col antialiased">
<!-- Top Navigation -->
<header class="flex items-center justify-between px-gutter pt-8 pb-4 w-full sticky top-0 z-10 bg-app">
<button class="w-12 h-12 bg-white border-neo rounded-full neo-shadow-sm flex items-center justify-center -rotate-2 hover:-rotate-6 transition-transform">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<div class="flex gap-2">
<div class="w-4 h-4 rounded-full bg-[#0088cc] border-2 border-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]"></div>
<div class="w-4 h-4 rounded-full bg-white border-2 border-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]"></div>
<div class="w-4 h-4 rounded-full bg-white border-2 border-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]"></div>
</div></header>
<main class="flex-1 px-gutter pb-32 flex flex-col gap-8 max-w-md mx-auto w-full">
<!-- Title Area -->
<section class="mt-4 -rotate-1 relative">
<h1 class="text-[42px] leading-[1.1] font-extrabold tracking-tight">Ne yapman gerekiyor?</h1>
</section>
<!-- Task Input -->
<section class="relative rotate-2 z-10 mt-4">
<div class="absolute -top-6 -right-2 px-3 py-1 bg-yellow-brand border-neo rounded-lg font-label-lg text-label-lg rotate-6 shadow-[3px_3px_0px_#000] z-20">
                Örn: Fatura öde
            </div>
<div class="relative">
<input class="w-full h-16 bg-white border-neo rounded-xl neo-shadow px-4 font-body-lg text-body-lg focus:outline-none focus:ring-0 placeholder:text-on-surface-variant" placeholder="Görev adı..." type="text"/>
</div>
</section>
<!-- Priority Selection -->
<section class="bg-white border-neo-thick rounded-xl neo-shadow p-6 -rotate-1 mt-4">
<h2 class="font-title-lg text-title-lg mb-4">Önem Derecesi</h2>
<div class="flex gap-2">
<button class="flex-1 py-3 px-2 bg-white border-neo rounded-xl font-label-lg text-label-lg hover:bg-surface-dim transition-colors text-center">
                    🟢 Düşük
                </button>
<button class="flex-1 py-3 px-2 bg-[#fef08a] border-neo rounded-xl font-label-lg text-label-lg neo-shadow-sm -translate-y-1 text-center">
                    🟡 Orta
                </button>
<button class="flex-1 py-3 px-2 bg-white border-neo rounded-xl font-label-lg text-label-lg hover:bg-surface-dim transition-colors text-center">
                    🔴 Yüksek
                </button>
</div>
</section>
<!-- Due Date/Time -->
<section class="bg-white border-neo-thick rounded-xl neo-shadow p-6 rotate-2 mt-4">
<h2 class="font-title-lg text-title-lg mb-4">Zaman</h2>
<div class="grid grid-cols-2 gap-4">
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#0077B6]">calendar_month</span>
<input class="w-full h-12 bg-white border-neo rounded-lg pl-10 pr-2 font-body-md text-body-md focus:outline-none" type="date"/>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#0077B6]">schedule</span>
<input class="w-full h-12 bg-white border-neo rounded-lg pl-10 pr-2 font-body-md text-body-md focus:outline-none" type="time"/>
</div>
</div>
</section>
</main>
<!-- Bottom Fixed Button -->
<div class="fixed bottom-0 left-0 w-full p-gutter pb-8 bg-gradient-to-t from-app via-app to-transparent z-50">
<div class="max-w-md mx-auto">
<button class="w-full h-16 bg-blue-brand text-white font-headline-md text-headline-md border-neo rounded-xl neo-shadow-btn rotate-1 flex items-center justify-center gap-2">Oluştur <span class="material-symbols-outlined font-bold">arrow_forward</span></button>
</div>
</div>
</body></html>
