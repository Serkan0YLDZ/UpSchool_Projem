<!DOCTYPE html><html lang="tr"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Action Menu</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&amp;display=swap" rel="stylesheet">
<style data-purpose="custom-fonts">
    body {
      font-family: 'Nunito', sans-serif;
      background-color: #f8fafc; /* Very light blue/gray background */
    }
  </style>
<script data-purpose="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'custom-yellow': '#fff9d6',
            'custom-bg': '#f6f9fc',
            'custom-text-dark': '#1e293b',
            'custom-text-muted': '#475569'
          },
          boxShadow: {
            'brutal': '8px 8px 0px 0px rgba(0,0,0,1)',
          },
          borderWidth: {
            '3': '3px',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-custom-bg text-custom-text-dark min-h-screen flex flex-col items-center pt-12 pb-8 px-6">
<!-- BEGIN: Header -->
<header class="mb-10 text-center w-full max-w-md">
<p class="text-custom-text-muted text-base font-semibold"><br></p>
</header>
<!-- END: Header -->
<!-- BEGIN: Main Content -->
<main class="w-full max-w-md space-y-8 flex-grow">
<!-- Card 1: Yeni Alışkanlık -->
<button class="w-full bg-white border-4 border-black rounded-3xl p-8 flex flex-col items-center justify-center shadow-brutal transition-transform active:translate-y-1 active:translate-x-1 active:shadow-none" data-purpose="action-card-1">
<div class="w-16 h-16 rounded-full border-4 border-black flex items-center justify-center mb-4 bg-white">
<svg class="h-8 w-8" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
<h2 class="text-xl font-extrabold uppercase tracking-wide mb-1 text-center">ALIŞKANLIK<br>Ekle</h2>
<p class="text-sm font-semibold text-custom-text-muted text-center">Günlük rutinini şekillendir</p>
</button>
<!-- Card 2: Takvime Ekle -->
<button class="w-full bg-custom-yellow border-4 border-black rounded-3xl p-8 flex flex-col items-center justify-center shadow-brutal transition-transform active:translate-y-1 active:translate-x-1 active:shadow-none" data-purpose="action-card-2">
<div class="w-16 h-16 rounded-full border-4 border-black flex items-center justify-center mb-4 bg-pink-100">
<svg class="h-8 w-8" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round"></path>
<path d="M12 12v4m-2-2h4" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
<h2 class="text-xl font-extrabold uppercase tracking-wide mb-1 text-center">TAKVİME<br>EKLE</h2>
<p class="text-sm font-semibold text-custom-text-muted text-center">Etkinlik veya randevunu kaydet</p>
</button>
<!-- Card 3: Yapılacak Ekle -->
<button class="w-full bg-white border-4 border-black rounded-3xl p-8 flex flex-col items-center justify-center shadow-brutal transition-transform active:translate-y-1 active:translate-x-1 active:shadow-none" data-purpose="action-card-3">
<div class="w-16 h-16 rounded-full border-4 border-black flex items-center justify-center mb-4 bg-white">
<svg class="h-8 w-8" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
<h2 class="text-xl font-extrabold uppercase tracking-wide mb-1 text-center">YAPILACAK<br>EKLE</h2>
<p class="text-sm font-semibold text-custom-text-muted text-center">Hızlı görev oluştur</p>
</button>
</main>
<!-- END: Main Content -->


</body></html>
