<!DOCTYPE html><html lang="tr"><head>

<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>

    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-brand-bg text-on-background min-h-screen flex flex-col relative pb-32 overflow-x-hidden">
<!-- Excluded Shared TopAppBar because this is a Focused View (Booking Flow/Step 1) -->
<!-- Minimal Header for Focused View -->
<header class="flex items-center justify-between p-margin pt-8">
<button class="w-12 h-12 bg-white border-[3px] border-black rounded-xl shadow-hard flex items-center justify-center -rotate-2 active:shadow-hard-active active:translate-y-1 active:translate-x-1 transition-all">
<span class="material-symbols-outlined text-black font-bold">arrow_back</span>
</button>
<div class="flex gap-2">
<div class="w-4 h-4 rounded-full bg-[#0088cc] border-2 border-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]"></div>
<div class="w-4 h-4 rounded-full bg-white border-2 border-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]"></div>
<div class="w-4 h-4 rounded-full bg-white border-2 border-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]"></div>
</div>
</header>
<main class="flex-1 px-margin flex flex-col gap-8 mt-4">
<!-- Title Area -->
<div class="rotate-1 bg-tertiary-fixed border-[3px] border-black p-6 rounded-xl shadow-hard relative">
<h1 class="text-4xl font-[800] leading-tight text-black tracking-tighter mt-2">Etkinliğe isim ver!</h1>
<p class="text-on-surface-variant font-medium mt-2"><br></p>
</div>
<!-- Event Title Input Area -->
<div class="relative mt-4">
<div class="absolute -top-6 right-2 bg-brand-blue text-white px-4 py-1.5 border-[3px] border-black rounded-full shadow-hard-sm text-sm font-bold rotate-6 z-10">
                Örn: Toplantı
            </div>
<input class="w-full h-16 bg-white border-[3px] border-black rounded-xl shadow-hard -rotate-1 px-4 font-bold text-lg focus:outline-none focus:ring-0 placeholder:text-outline-variant placeholder:font-medium transition-all focus:-rotate-0" placeholder="Etkinlik adını yazın..." type="text">
</div>
<!-- Description Area -->
<div class="flex flex-col gap-2 mt-4 rotate-1">
<label class="font-bold text-sm px-1">Açıklama (opsiyonel)</label>
<textarea class="w-full h-24 bg-white border-[3px] border-black rounded-xl shadow-hard-sm px-4 py-3 font-medium resize-none focus:outline-none focus:ring-0 placeholder:text-outline-variant transition-all focus:rotate-0" placeholder="Detaylar..."></textarea>
</div>
<!-- Quick Suggestions -->
<div class="mt-6 flex flex-col gap-3">
<h3 class="font-bold text-sm px-1">Hızlı Öneriler</h3>
<div class="flex flex-wrap gap-3">
<button class="bg-white border-[3px] border-black rounded-xl px-4 py-2 shadow-hard-sm font-bold flex items-center gap-2 -rotate-2 active:shadow-hard-active active:translate-y-1 transition-all">
<span class="">📅</span> Toplantı
                </button>
<button class="bg-white border-[3px] border-black rounded-xl px-4 py-2 shadow-hard-sm font-bold flex items-center gap-2 rotate-1 active:shadow-hard-active active:translate-y-1 transition-all">
<span class="">🏥</span> Doktor Randevusu
                </button>
<button class="bg-white border-[3px] border-black rounded-xl px-4 py-2 shadow-hard-sm font-bold flex items-center gap-2 -rotate-1 active:shadow-hard-active active:translate-y-1 transition-all">
<span class="">🏃</span> Spor
                </button>
<button class="bg-white border-[3px] border-black rounded-xl px-4 py-2 shadow-hard-sm font-bold flex items-center gap-2 rotate-2 active:shadow-hard-active active:translate-y-1 transition-all">
<span class="">✈️</span> Seyahat
                </button>
<button class="bg-white border-[3px] border-black rounded-xl px-4 py-2 shadow-hard-sm font-bold flex items-center gap-2 -rotate-3 active:shadow-hard-active active:translate-y-1 transition-all">
<span class="">🎂</span> Doğum Günü
                </button>
</div>
</div>
</main>
<!-- Fixed Bottom Button -->
<div class="fixed bottom-0 left-0 w-full p-margin bg-gradient-to-t from-brand-bg via-brand-bg to-transparent pb-8">
<button class="w-full h-16 bg-brand-blue text-white border-[3px] border-black rounded-xl shadow-hard font-bold text-lg flex items-center justify-center gap-2 -rotate-1 active:shadow-hard-active active:translate-y-1 active:translate-x-1 transition-all">
            Devam Et <span class="material-symbols-outlined font-bold">arrow_forward</span>
</button>
</div>


</body></html>
