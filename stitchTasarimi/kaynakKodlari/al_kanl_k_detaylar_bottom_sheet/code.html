<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Alışkanlık Detayları</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#e5e8ec",
                        "secondary": "#006875",
                        "secondary-fixed": "#9feffe",
                        "on-secondary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#4cd6fb",
                        "secondary-container": "#9cecfb",
                        "on-secondary-fixed": "#001f24",
                        "background": "#f7fafe",
                        "surface-dim": "#d7dade",
                        "surface-variant": "#e0e3e7",
                        "outline": "#707881",
                        "error": "#ba1a1a",
                        "surface-bright": "#f7fafe",
                        "on-secondary-container": "#016d7a",
                        "primary-fixed-dim": "#94ccff",
                        "on-primary-fixed-variant": "#004b74",
                        "primary": "#005d90",
                        "on-error": "#ffffff",
                        "inverse-primary": "#94ccff",
                        "surface-container-low": "#f1f4f8",
                        "surface-container": "#ebeef2",
                        "on-tertiary-container": "#ecf9ff",
                        "on-tertiary-fixed": "#001f27",
                        "on-primary": "#ffffff",
                        "surface": "#f7fafe",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#e0e3e7",
                        "tertiary-fixed": "#b3ebff",
                        "on-secondary-fixed-variant": "#004f59",
                        "on-tertiary-fixed-variant": "#004e5f",
                        "on-background": "#181c1f",
                        "surface-tint": "#006399",
                        "tertiary-container": "#007c95",
                        "tertiary": "#006176",
                        "outline-variant": "#bfc7d1",
                        "primary-fixed": "#cde5ff",
                        "on-surface-variant": "#404850",
                        "secondary-fixed-dim": "#83d3e1",
                        "inverse-on-surface": "#eef1f5",
                        "inverse-surface": "#2d3134",
                        "on-primary-fixed": "#001d32",
                        "primary-container": "#0077b6",
                        "on-error-container": "#93000a",
                        "on-surface": "#181c1f",
                        "on-primary-container": "#f3f7ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "lg": "40px",
                        "xl": "64px",
                        "base": "8px",
                        "margin-mobile": "20px",
                        "margin-desktop": "48px",
                        "md": "24px",
                        "sm": "12px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "headline-sm": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "label-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "headline-sm": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "label-lg": ["14px", { "lineHeight": "1.2", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .ambient-shadow { box-shadow: 0 8px 32px rgba(0, 119, 182, 0.08); }
        .bubbly-hover:hover { transform: scale(1.02); }
        .bubbly-active:active { transform: scale(0.98); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-high h-screen w-full relative overflow-hidden flex flex-col">
<!-- Blurred Background Content (Simulated Home Screen) -->
<div class="absolute inset-0 z-0 opacity-40 blur-sm pointer-events-none p-6">
<div class="h-40 w-full bg-surface-container rounded-2xl mb-6"></div>
<div class="h-24 w-full bg-surface-container rounded-2xl mb-4"></div>
<div class="h-24 w-full bg-surface-container rounded-2xl"></div>
</div>
<!-- Overlay -->
<div class="absolute inset-0 bg-on-background/20 z-10 backdrop-blur-sm"></div>
<!-- Bottom Sheet Modal -->
<div class="absolute bottom-0 left-0 w-full z-20 bg-background rounded-t-[32px] ambient-shadow flex flex-col md:w-full md:max-w-md md:left-1/2 md:-translate-x-1/2">
<!-- Drag Handle -->
<div class="w-full flex justify-center pt-4 pb-2">
<div class="w-12 h-1.5 bg-surface-variant rounded-full"></div>
</div>
<div class="p-6 md:p-md flex flex-col gap-lg">
<!-- Header -->
<div class="flex justify-between items-center">
<h1 class="font-headline-md text-headline-md text-on-surface">Alışkanlık Detayları</h1>
<button class="w-10 h-10 rounded-full bg-surface-container-low flex items-center justify-center text-on-surface-variant bubbly-hover">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Section 1: Tekrar Sıklığı -->
<div class="flex flex-col gap-sm">
<h2 class="font-label-lg text-label-lg text-on-surface-variant">Tekrar Sıklığı</h2>
<div class="flex justify-between items-center w-full gap-2">
<!-- PZT (Selected) -->
<button class="flex-1 aspect-square rounded-full flex items-center justify-center bg-primary-container text-on-primary-container font-label-sm text-label-sm bubbly-active transition-colors ambient-shadow">
                        PZT
                    </button>
<!-- SAL -->
<button class="flex-1 aspect-square rounded-full flex items-center justify-center border border-outline-variant text-outline font-label-sm text-label-sm bubbly-active transition-colors">
                        SAL
                    </button>
<!-- ÇAR (Selected) -->
<button class="flex-1 aspect-square rounded-full flex items-center justify-center bg-primary-container text-on-primary-container font-label-sm text-label-sm bubbly-active transition-colors ambient-shadow">
                        ÇAR
                    </button>
<!-- PER -->
<button class="flex-1 aspect-square rounded-full flex items-center justify-center border border-outline-variant text-outline font-label-sm text-label-sm bubbly-active transition-colors">
                        PER
                    </button>
<!-- CUM (Selected) -->
<button class="flex-1 aspect-square rounded-full flex items-center justify-center bg-primary-container text-on-primary-container font-label-sm text-label-sm bubbly-active transition-colors ambient-shadow">
                        CUM
                    </button>
<!-- CTS -->
<button class="flex-1 aspect-square rounded-full flex items-center justify-center border border-outline-variant text-outline font-label-sm text-label-sm bubbly-active transition-colors">
                        CTS
                    </button>
<!-- PAZ -->
<button class="flex-1 aspect-square rounded-full flex items-center justify-center border border-outline-variant text-outline font-label-sm text-label-sm bubbly-active transition-colors">
                        PAZ
                    </button>
</div>
</div>
<!-- Section 2: Önem Derecesi -->
<div class="flex flex-col gap-sm">
<h2 class="font-label-lg text-label-lg text-on-surface-variant">Önem Derecesi</h2>
<div class="flex w-full bg-surface-container-low rounded-full p-1 ambient-shadow relative overflow-hidden">
<!-- Option 1 -->
<button class="flex-1 py-3 rounded-full font-label-lg text-label-lg text-on-surface-variant text-center relative z-10 transition-colors">
                        Düşük
                    </button>
<!-- Option 2 -->
<button class="flex-1 py-3 rounded-full font-label-lg text-label-lg text-on-surface-variant text-center relative z-10 transition-colors">
                        Orta
                    </button>
<!-- Option 3 (Selected) -->
<button class="flex-1 py-3 rounded-full font-label-lg text-label-lg text-on-tertiary bg-tertiary text-center relative z-10 shadow-sm transition-colors">
                        Yüksek
                    </button>
</div>
</div>
<!-- Spacer -->
<div class="h-4"></div>
<!-- Save Button -->
<button class="w-full py-4 bg-primary-container rounded-full text-on-primary-container font-headline-sm text-headline-sm flex items-center justify-center gap-2 ambient-shadow bubbly-hover bubbly-active transition-all">
<span class="material-symbols-outlined" data-icon="check" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check</span>
                Kaydet
            </button>
</div>
</div>
</body></html>
