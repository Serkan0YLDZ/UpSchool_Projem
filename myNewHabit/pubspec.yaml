name: my_new_habit
description: "myNewHabit — local-first habit & task tracker. Sprint 1: Proje Kurulumu & Tasarım Sistemi."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State management (Provider — no Bloc/Riverpod per .rules/01-tech-stack.md)
  provider: ^6.1.2

  # Navigation
  go_router: ^17.2.2

  # Local database — offline-only MVP
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Notifications
  flutter_local_notifications: ^21.0.0

  # Typography
  google_fonts: ^8.0.2

  # Date/time formatting
  intl: ^0.20.2

  # Onboarding flag persistence
  shared_preferences: ^2.3.2

  # Unique identifiers
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # sqflite için masaüstü / CI test desteği (record_repository_test.dart)
  sqflite_common_ffi: ^2.3.4

# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
